version: "3.7"

services:
  dashboard:
    image: dashboard_gabinete:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres_postgres:5432/database_name
      - DASH_USERS={"dani":"dani2026","alipio":"alipio2026","ledenir":"ledenir2026","joao":"joao2026","reimont":"reimont2026","divino":"divino2026","janaina":"janaina2026","mita":"mita2026","suellyema":"suellyema2026","natalia":"natalia2026","claudina":"claudina2026","carin":"carin2026","rayana":"rayana2026"}
      - DASH_ADMINS=["dani","alipio","ledenir","joao","reimont","divino"]
      - DASH_RESPONSAVEL_MAP={"janaina":"Janaina","mita":"Mitã","suellyema":"Suellyema","natalia":"Natalia","claudina":"Claudina","carin":"Carin","rayana":"Rayana"}
      - JWT_SECRET=TROCAR-POR-UMA-CHAVE-SECRETA-ALEATORIA
      - REDIS_URL=redis://redis_redis:6379
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NODE_ENV=production

    networks:
      - ApolonioNet

    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard-gabinete.rule=Host(`dashboard.gabinete.cloud`)"
        - "traefik.http.routers.dashboard-gabinete.entrypoints=websecure"
        - "traefik.http.routers.dashboard-gabinete.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.dashboard-gabinete.loadbalancer.server.port=3000"
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 512M

networks:
  ApolonioNet:
    external: true
    name: ApolonioNet
